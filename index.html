<!doctype html>
<html lang="it" data-theme="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Progetti di Davide</title>
    <meta name="description" content="Panoramica dei progetti: demo live, codice e dettagli." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f5f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0e10" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,500&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=7" />
    <script>
      // Tema + interfaccia PRIMA del paint: niente flash.
      (function () {
        try {
          var p = localStorage.getItem("bridge-theme");
          if (p === "light" || p === "dark") document.documentElement.setAttribute("data-theme", p);
          var ui = localStorage.getItem("bridge-ui");
          document.documentElement.setAttribute("data-ui", ui || "cinema");
        } catch (e) {
          document.documentElement.setAttribute("data-ui", "cinema");
        }
      })();
    </script>
  </head>
  <body>
    <!-- Hamburger flottante + menu overlay (sezioni + lingua + tema) -->
    <button class="burger" id="burger" aria-label="Apri il menu" aria-expanded="false" aria-controls="menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="menu" id="menu" aria-hidden="true">
      <div class="menu-inner">
        <p class="menu-label" id="menu-sections-label">Sezioni</p>
        <ul class="menu-list" id="menu-list"></ul>
        <div class="menu-controls">
          <div class="menu-ctl">
            <span class="menu-ctl-label" id="menu-lang-label">Lingua</span>
            <div class="lang-seg" role="group" aria-label="Lingua" id="lang-seg"></div>
          </div>
          <div class="menu-ctl">
            <span class="menu-ctl-label" id="menu-theme-label">Tema</span>
            <div class="theme-seg" role="group" aria-label="Tema" id="theme-seg"></div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Frecce di navigazione verticale (interfaccia cinema) -->
    <div class="nav-arrows" id="nav-arrows" aria-hidden="true">
      <button type="button" class="nav-arrow" data-dir="-1" aria-label="Precedente">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6" /></svg>
      </button>
      <button type="button" class="nav-arrow" data-dir="1" aria-label="Successivo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6" /></svg>
      </button>
    </div>

    <main id="main">
      <section class="hero" id="hero">
        <div class="hero-inner">
          <p class="hero-eyebrow" id="hero-eyebrow">Portfolio</p>
          <h1 id="hero-title">I miei progetti</h1>
          <p class="hero-tagline" id="hero-tagline"></p>
          <button class="hero-scroll" id="hero-scroll" type="button" aria-label="Scorri ai progetti">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6" /></svg>
          </button>
        </div>
      </section>

      <div id="stage" class="stage"></div>

      <section class="bio" id="bio" hidden>
        <div class="bio-inner">
          <div class="bio-photo" id="bio-photo"></div>
          <div class="bio-content">
            <p class="bio-eyebrow" id="bio-eyebrow"></p>
            <h2 class="bio-name" id="bio-name"></h2>
            <p class="bio-role" id="bio-role"></p>
            <p class="bio-desc" id="bio-desc"></p>
            <ul class="bio-quotes" id="bio-quotes"></ul>
            <div class="bio-social" id="bio-social"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Dock elegante: selettore d'interfaccia (sostituisce il footer tradizionale) -->
    <footer class="dock" id="dock">
      <a class="dock-brand" id="dock-brand" href="#hero">Davide Pica</a>
      <div class="dock-switch" id="dock-switch" role="tablist" aria-label="Interfaccia"></div>
      <div class="dock-social" id="dock-social"></div>
    </footer>

    <script type="module" src="./app.js?v=7"></script>
  </body>
</html>
