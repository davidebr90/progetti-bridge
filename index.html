<!doctype html>
<html lang="it" data-theme="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Progetti di Davide</title>
    <meta name="description" content="Panoramica dei progetti: demo live, codice e dettagli." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f5f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0e10" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Tema PRIMA del paint: niente flash. auto = segue il sistema.
      (function () {
        try {
          var p = localStorage.getItem("bridge-theme");
          if (p === "light" || p === "dark") document.documentElement.setAttribute("data-theme", p);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Controllo tema flottante, fuori da qualunque header -->
    <div class="theme-float">
      <div class="theme-seg" role="group" aria-label="Tema" id="theme-seg"></div>
    </div>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <p class="hero-eyebrow" id="hero-eyebrow">Portfolio</p>
          <h1 id="hero-title">I miei progetti</h1>
          <p class="hero-tagline" id="hero-tagline"></p>
          <a class="hero-scroll" href="#projects" aria-label="Scorri ai progetti">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6" /></svg>
          </a>
        </div>
      </section>

      <div id="projects" class="projects"></div>

      <section class="bio" id="bio" hidden>
        <div class="bio-inner">
          <div class="bio-photo" id="bio-photo"></div>
          <div class="bio-content">
            <p class="bio-eyebrow" id="bio-eyebrow"></p>
            <h2 class="bio-name" id="bio-name"></h2>
            <p class="bio-role" id="bio-role"></p>
            <p class="bio-desc" id="bio-desc"></p>
            <ul class="bio-quotes" id="bio-quotes"></ul>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span id="footer-name">© Davide</span>
      <a id="footer-gh" href="#" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
